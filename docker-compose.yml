services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=change-me-in-production
      - DATABASE=/data/travel_planner.db
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
    volumes:
      - db_data:/data

volumes:
  db_data:
