{% extends "base.html" %} {% block title %}{{ 'Edit Trip' if project else 'New
Trip' }}{% endblock %} {% block content %}
<div class="max-w-xl">
  <nav class="text-sm text-gray-400 mb-6 flex items-center gap-1.5">
    <a href="{{ url_for('web.dashboard') }}" class="hover:text-navy transition"
      >Trips</a
    >
    <span>/</span>
    <span class="text-navy font-medium"
      >{{ 'Edit Trip' if project else 'New Trip' }}</span
    >
  </nav>

  <h1 class="text-2xl font-bold text-navy mb-8">
    {{ 'Edit Trip' if project else 'Plan a New Trip' }}
  </h1>

  <div class="bg-white rounded-2xl shadow-card p-8">
    <form
      method="POST"
      action="{{ url_for('web.update_project', project_id=project.id) if project else url_for('web.create_project') }}"
      class="space-y-6"
    >
      <div>
        <label
          class="block text-sm font-medium text-gray-700 mb-1.5"
          for="name"
        >
          Trip name <span class="text-coral">*</span>
        </label>
        <input
          id="name"
          name="name"
          type="text"
          required
          maxlength="200"
          value="{{ project.name if project else '' }}"
          placeholder="e.g. Summer in Italy"
          class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-coral/30 focus:border-coral transition"
        />
      </div>

      <div>
        <label
          class="block text-sm font-medium text-gray-700 mb-1.5"
          for="description"
        >
          Description <span class="text-gray-400 font-normal">(optional)</span>
        </label>
        <textarea
          id="description"
          name="description"
          rows="3"
          maxlength="1000"
          placeholder="A short description of your trip…"
          class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-coral/30 focus:border-coral transition resize-none"
        >
{{ project.description if project and project.description else '' }}</textarea
        >
      </div>

      <div>
        <label
          class="block text-sm font-medium text-gray-700 mb-1.5"
          for="start_date"
        >
          Start date <span class="text-gray-400 font-normal">(optional)</span>
        </label>
        <input
          id="start_date"
          name="start_date"
          type="date"
          value="{{ project.start_date if project and project.start_date else '' }}"
          class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-coral/30 focus:border-coral transition"
        />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label
            class="block text-sm font-medium text-gray-700 mb-1.5"
            for="country"
          >
            Country <span class="text-gray-400 font-normal">(optional)</span>
          </label>
          <input
            id="country"
            name="country"
            type="text"
            maxlength="100"
            value="{{ project.country if project and project.country else '' }}"
            placeholder="e.g. Italy"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-coral/30 focus:border-coral transition"
          />
        </div>
        <div>
          <label
            class="block text-sm font-medium text-gray-700 mb-1.5"
            for="city"
          >
            City <span class="text-gray-400 font-normal">(optional)</span>
          </label>
          <input
            id="city"
            name="city"
            type="text"
            maxlength="100"
            value="{{ project.city if project and project.city else '' }}"
            placeholder="e.g. Rome"
            class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-coral/30 focus:border-coral transition"
          />
        </div>
      </div>

      <div class="flex gap-3 pt-2">
        <button
          type="submit"
          class="bg-coral hover:bg-coral/90 text-white font-semibold rounded-xl px-6 py-2.5 text-sm transition"
        >
          {{ 'Save changes' if project else 'Create trip' }}
        </button>
        <a
          href="{{ url_for('web.project_detail', project_id=project.id) if project else url_for('web.dashboard') }}"
          class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-xl px-6 py-2.5 text-sm transition"
        >
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
