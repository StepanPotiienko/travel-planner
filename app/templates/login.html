<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { navy: "#1A1A2E", coral: "#E94560", canvas: "#F6F7FB" },
            fontFamily: { sans: ["Inter", "sans-serif"] },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-canvas font-sans min-h-screen flex items-center justify-center"
  >
    <div class="w-full max-w-md">
      <div class="bg-white rounded-2xl shadow-card px-10 py-12">
        <div class="text-center mb-8">
          <span class="text-4xl font-bold text-navy">TP</span>
          <h1 class="mt-3 text-2xl font-bold text-navy">TravelPlanner</h1>
          <p class="mt-1 text-gray-500 text-sm">Sign in to manage your trips</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %} {% for
        category, message in messages %}
        <div
          class="mb-4 rounded-xl px-4 py-3 text-sm font-medium {% if category == 'error' %}bg-red-50 text-red-700 border border-red-200 {% else %}bg-emerald-50 text-emerald-700 border border-emerald-200{% endif %}"
        >
          {{ message }}
        </div>
        {% endfor %} {% endwith %}

        <form
          method="POST"
          action="{{ url_for('web.login_post') }}"
          class="space-y-5"
        >
          <div>
            <label
              class="block text-sm font-medium text-gray-700 mb-1.5"
              for="username"
              >Username</label
            >
            <input
              id="username"
              name="username"
              type="text"
              required
              autocomplete="username"
              class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-coral/30 focus:border-coral transition"
            />
          </div>
          <div>
            <label
              class="block text-sm font-medium text-gray-700 mb-1.5"
              for="password"
              >Password</label
            >
            <input
              id="password"
              name="password"
              type="password"
              required
              autocomplete="current-password"
              class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-coral/30 focus:border-coral transition"
            />
          </div>
          <button
            type="submit"
            class="w-full bg-coral hover:bg-coral/90 text-white font-semibold rounded-xl py-2.5 text-sm transition"
          >
            Sign in
          </button>
        </form>
      </div>
    </div>

    <style>
      .shadow-card {
        box-shadow: 0 4px 32px rgba(0, 0, 0, 0.08);
      }
    </style>
  </body>
</html>
